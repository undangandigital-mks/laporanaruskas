        function switchTab(tab) {
    // 1. Reset State Global
    currentTab = tab;
    currentPage = 1;

    // 2. Definisi elemen utama dashboard
    const statsGrid = document.getElementById('statsGrid');
    const filterContainer = document.querySelector('.bg-white.p-4.rounded-xl.card-shadow');
    const tableContainer = document.querySelector('.bg-white.rounded-xl.card-shadow.overflow-hidden');
    const mainDashboardElements = [statsGrid, filterContainer, tableContainer];

    // 3. Sembunyikan SEMUA halaman laporan khusus (page-content)
    document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));

    // 4. Update Visual Tombol Navigasi
    document.querySelectorAll('[id^="tab-"]').forEach(btn => {
        btn.classList.remove('tab-active', 'text-blue-600', 'font-bold');
        btn.classList.add('text-slate-500');

    // 5. Logika Percabangan Tampilan

        mainDashboardElements.forEach(el => el?.classList.add('hidden'));
        
        const targetPage = document.getElementById(tab + 'Page');
        if (targetPage) targetPage.classList.remove('hidden');

            renderLaporanKas();

            if(document.getElementById('lrDateStart')) {

}
        async function fetchAllData() {
    const btn = document.getElementById('refreshBtn');
    const loader = document.getElementById('loadingOverlay');
    btn.disabled = true;
    loader.classList.remove('hidden');

    try {
        // 1. Ambil data CSV Publik (Transaksi, Piutang, Stok)
        const results = await Promise.all([
            fetchCSV(URLS.transaksi),
            fetchCSV(URLS.piutang),
            fetchCSV(URLS.stok)
        ]);
        
        db.transaksi = results[0];
        db.piutang = results[1];
        db.stok = results[2];

        // 2. AMBIL DATA SHOPEE DARI APPS SCRIPT
        const shopeeRes = await fetch(`${window.SCRIPT_URL}?action=getShopeeData`);
        const shopeeJson = await shopeeRes.json();
        db.shopee_income = shopeeJson.data || [];

        setDateFilter('all');
    } catch (e) {
        console.error("Gagal mengambil data:", e);
        // Tetap jalankan render meskipun shopee gagal agar data lain muncul
        setDateFilter('all'); 
    } finally {
        btn.disabled = false;
        loader.classList.add('hidden');
    }
}

        function fetchCSV(url) {
            return new Promise((resolve, reject) => {
                Papa.parse(url, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => resolve(results.data),
                    error: (err) => reject(err)
                });
            });
        }



async function processShopeeExcel(file) {
    if (!file) return;
    
    const btn = document.querySelector("button[onclick*='shopeeInput']");
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i> Memproses...';
    btn.disabled = true;

    const reader = new FileReader();
    reader.onload = async (e) => {
        try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            
            const sheetName = "Income";
            const worksheet = workbook.Sheets[sheetName];
            
            if (!worksheet) {
                alert("Gagal: Sheet bernama 'Income' tidak ditemukan.");
                btn.innerHTML = originalText;
                btn.disabled = false;
                return;
            }

            const rawData = XLSX.utils.sheet_to_json(worksheet, { range: 5 });
            const shopeeDataToSave = [];

            // Fungsi pembantu untuk konversi angka aman
            const parseVal = (val) => {
                if (typeof val === 'number') return val;
                if (!val || val === "-") return 0;
                return parseFloat(String(val).replace(/[^\d.-]/g, '')) || 0;
            };

            rawData.forEach(row => {
                if (row['No. Pesanan']) {
                    // 1. Ambil Komponen Pendapatan
                    const hargaAsli = parseVal(row['Harga Asli Produk']);
                    const returKePembeli = parseVal(row['Jumlah Pengembalian Dana ke Pembeli']);
                    const diskonProduk = parseVal(row['Total Diskon Produk']);

                    /**
                     * LOGIKA BRUTO BERSIH:
                     * Karena nilai Retur dan Diskon di Excel Shopee biasanya negatif (minus),
                     * kita gunakan Math.abs() agar menjadi positif, lalu dikurangi dari Harga Asli.
                     */
                    const brutoBersih = hargaAsli - Math.abs(returKePembeli) - Math.abs(diskonProduk);
                    
                    // 2. Hitung total semua potongan (Biaya Admin, Layanan, dll)
                    const admin = parseVal(row['Biaya Administrasi']);
                    const layanan = parseVal(row['Biaya Layanan']);
                    const transaksi = parseVal(row['Biaya Transaksi']);
                    const kampanye = parseVal(row['Biaya Kampanye']);
                    const proses = parseVal(row['Biaya Proses Pesanan']);
                    
                    const totalPotongan = Math.abs(admin + layanan + transaksi + kampanye + proses);
                    const netIncome = parseVal(row['Total Penghasilan']);

                    shopeeDataToSave.push({
                        tgl_cair: row['Tanggal Dana Dilepaskan'] || '',
                        no_pesanan: row['No. Pesanan'],
                        pembeli: row['Username (Pembeli)'] || '',
                        omzet_bruto: brutoBersih,
                        total_potongan: totalPotongan,
                        net_income: netIncome
                    });
                }
            });

            if (shopeeDataToSave.length === 0) {
                alert("Data kosong atau format header salah.");
            } else {
                await fetch(window.SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Tetap gunakan mode ini jika Apps Script tidak diatur CORS-nya
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'insertShopeeData',
                        data: shopeeDataToSave
                    })
                });

                alert(`Berhasil mengimpor ${shopeeDataToSave.length} data. Data lama telah dibersihkan.`);
                if (typeof fetchAllData === "function") fetchAllData();
            }

        } catch (error) {
            console.error("Error Detail:", error);
            alert("Terjadi kesalahan teknis saat membaca file.");
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    };
    reader.readAsArrayBuffer(file);
}


       function calculateStats() {
    let masuk = 0, keluar = 0, piutangTerfilter = 0, piutangTotalSemua = 0, totalRefund = 0;
    
    const excludedCategories = ["transfer saldo", "saldo awal"];
    const refundCategory = "pengembalian dana"; 

    const query = document.getElementById('searchInput').value.toLowerCase();
    const start = document.getElementById('dateStart').value;
    const end = document.getElementById('dateEnd').value;

    // 1. HITUNG TRANSAKSI (DENGAN FILTER)
    db.transaksi.forEach(r => {
        let pass = Object.values(r).some(v => String(v).toLowerCase().includes(query));
        if (pass && (start || end)) {
            const dateStr = r["Waktu"];
            if(dateStr) {
                const itemTime = new Date(dateStr).getTime();
                if(!isNaN(itemTime)) {
                    if(start) pass = pass && itemTime >= new Date(start).getTime();
                    if(end) pass = pass && itemTime <= new Date(end).setHours(23, 59, 59, 999);
                }
            }
        }
        
        if (pass) {
            const category = (r["Kategori"] || "").toLowerCase().trim();
            const isExcluded = excludedCategories.some(excluded => category.includes(excluded));
            
            if (!isExcluded) {
                const rMasuk = parseFloat(r["Masuk"]) || 0;
                const rKeluar = parseFloat(r["Keluar"]) || 0;

                if (category.includes(refundCategory)) {
                    totalRefund += rKeluar;
                } else {
                    masuk += rMasuk;
                    keluar += rKeluar;
                }
            }
        }
    });

    // 2. HITUNG PIUTANG (DUA LOGIKA)
    db.piutang.forEach(r => {
        const sisa = parseFloat(r["Sisa Piutang"]) || 0;
        const status = (r["Status"] || "").toLowerCase();
        
        if (sisa > 0 && status !== 'lunas') {
            // A. LOGIKA UNTUK KOTAK SISA PIUTANG (TANPA FILTER)
            piutangTotalSemua += sisa;

            // B. LOGIKA UNTUK TOTAL PENDAPATAN (DENGAN FILTER)
            let passPiutang = Object.values(r).some(v => String(v).toLowerCase().includes(query));
            if (passPiutang && (start || end)) {
                const dateStr = r["Waktu"]; // Pastikan ada kolom "Waktu" di tab Piutang
                if(dateStr) {
                    const itemTime = new Date(dateStr).getTime();
                    if(!isNaN(itemTime)) {
                        if(start) passPiutang = passPiutang && itemTime >= new Date(start).getTime();
                        if(end) passPiutang = passPiutang && itemTime <= new Date(end).setHours(23, 59, 59, 999);
                    }
                }
            }
            if (passPiutang) {
                piutangTerfilter += sisa;
            }
        }
    });

    // --- KALKULASI AKHIR ---
    
    // Pendapatan = (Uang Masuk Terfilter - Refund Terfilter) + Piutang Terfilter
    const pendapatanFinal = (masuk - totalRefund) + piutangTerfilter;
    
    // Laba Kotor = Uang Masuk Terfilter - (Keluar Terfilter + Refund Terfilter)
    const labaKotor = masuk - (keluar + totalRefund);

    // Update UI Dashboard
    document.getElementById('totalMasuk').innerText = formatIDR(pendapatanFinal);
    document.getElementById('totalKeluar').innerText = formatIDR(keluar); 
    document.getElementById('totalSaldo').innerText = formatIDR(labaKotor); 
    
    // Tampilan Sisa Piutang menggunakan total keseluruhan (tanpa filter)
    document.getElementById('totalPiutang').innerText = formatIDR(piutangTotalSemua);

    const saldoEl = document.getElementById('totalSaldo');
    saldoEl.className = labaKotor < 0 
        ? "text-xs md:text-lg font-bold text-red-600 truncate" 
        : "text-xs md:text-lg font-bold text-blue-700 truncate";
}

async function processPembelianExcel(file) {
    if (!file) return;
    
    const btn = document.querySelector("button[onclick*='pembelianInput']");
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i> Memproses...';
    btn.disabled = true;

    const reader = new FileReader();
    reader.onload = async (e) => {
        try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const rawData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

            // Grouping berdasarkan Keterangan
            const grouped = rawData.reduce((acc, row) => {
                const ket = row['Keterangan'];
                if (!acc[ket]) {
                    acc[ket] = {
                        id: "TRX-" + Date.now() + Math.floor(Math.random() * 1000),
                        waktu: row['Waktu'] || new Date().toISOString().replace('T', ' ').split('.')[0],
                        tipe: "KELUAR",
                        kategori: "Pembelian",
                        metode: row['Metode'] || "Cash",
                        keterangan: ket,
                        masuk: 0,
                        keluar: 0,
                        subjek: row['Keterangan'].replace('Pembelian dari ', ''), // Ekstrak nama subjek jika ada
                        diskon: 0,
                        items: []
                    };
                }
                
                const harga = parseFloat(row['Harga Produk']) || 0;
                const qty = parseFloat(row['Qty']) || 0;
                const totalRow = parseFloat(row['Total Harga Produk']) || (harga * qty);

                acc[ket].keluar += totalRow;
                acc[ket].items.push({
                    nama: row['Nama Produk'],
                    qty: qty,
                    harga: harga
                });
                
                return acc;
            }, {});

            const finalData = Object.values(grouped).map(g => ({
                ...g,
                detail_json: JSON.stringify(g.items)
            }));

            if (finalData.length === 0) return alert("Data kosong");

            await fetch(window.SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'insertPembelianData',
                    data: finalData
                })
            });

            alert(`Berhasil mengimpor ${finalData.length} transaksi pembelian.`);
            if(typeof fetchAllData === 'function') fetchAllData(); 
        } catch (error) {
            console.error(error);
            alert("Gagal: Pastikan header Excel sesuai: Waktu, Keterangan, Nama Produk, Harga Produk, Qty, Total Harga Produk, Metode");
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    };
    reader.readAsArrayBuffer(file);
}

        function handleSearch() { currentPage = 1; applyFilter(); }

        function setDateFilter(mode) {
            dateFilterMode = mode;
            currentPage = 1;
            const startInput = document.getElementById('dateStart');
            const endInput = document.getElementById('dateEnd');
            const now = new Date();

            const formatDate = (date) => {
                const d = new Date(date);
                if (isNaN(d.getTime())) return '';
                let month = '' + (d.getMonth() + 1);
                let day = '' + d.getDate();
                let year = d.getFullYear();
                if (month.length < 2) month = '0' + month;
                if (day.length < 2) day = '0' + day;
                return [year, month, day].join('-');
            };

            if (mode === 'today') {
                const todayStr = formatDate(now);
                startInput.value = todayStr;
                endInput.value = todayStr;
            } else if (mode === 'month') {
                const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
                let lastTransDate = new Date(now.getFullYear(), now.getMonth() + 1, 0); 
                
                if (db.transaksi && db.transaksi.length > 0) {
                    const currentMonth = now.getMonth();
                    const currentYear = now.getFullYear();
                    const monthDates = db.transaksi
                        .map(r => new Date(r["Waktu"]))
                        .filter(d => !isNaN(d.getTime()) && d.getMonth() === currentMonth && d.getFullYear() === currentYear);
                    if (monthDates.length > 0) lastTransDate = new Date(Math.max(...monthDates.map(d => d.getTime())));
                }
                startInput.value = formatDate(firstDay);
                endInput.value = formatDate(lastTransDate);
            } else if (mode === 'all') {
                if (db.transaksi && db.transaksi.length > 0) {
                    const dates = db.transaksi.map(r => new Date(r["Waktu"]).getTime()).filter(t => !isNaN(t));
                    if (dates.length > 0) {
                        startInput.value = formatDate(new Date(Math.min(...dates)));
                        endInput.value = formatDate(new Date(Math.max(...dates)));
                    }
                }
            }

            ['all', 'today', 'month'].forEach(m => {
                document.getElementById(`btn-date-${m}`).classList.toggle('filter-btn-active', m === mode);
            });

            applyFilter();
        }

        function handleDateChange() {
            dateFilterMode = 'custom';
            ['all', 'today', 'month'].forEach(m => {
                document.getElementById(`btn-date-${m}`).classList.remove('filter-btn-active');
            });
            currentPage = 1;
            applyFilter();
        }

        function resetDateRange() { setDateFilter('all'); }

        function applyFilter() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const startVal = document.getElementById('dateStart').value;
    const endVal = document.getElementById('dateEnd').value;

    let data = db[currentTab] || [];
    
    // 1. Filter berdasarkan pencarian kata kunci
    let result = data.filter(row => Object.values(row).some(v => String(v).toLowerCase().includes(query)));

    // 2. Filter khusus Piutang (hanya yang belum lunas)
    if (currentTab === 'piutang') {
        result = result.filter(row => (parseFloat(row["Sisa Piutang"]) || 0) > 0);
    }

    // 3. Filter berdasarkan Tanggal (kecuali tab stok)
    if (currentTab !== 'stok' && (startVal || endVal)) {
        result = result.filter(row => {
            const dateStr = row["Waktu"] || row["Update Terakhir"];
            if(!dateStr) return true;
            const itemTime = new Date(dateStr).getTime();
            if(isNaN(itemTime)) return true;
            
            let pass = true;
            if(startVal) pass = pass && itemTime >= new Date(startVal).getTime();
            if(endVal) pass = pass && itemTime <= new Date(endVal).setHours(23, 59, 59, 999);
            return pass;
        });
    }

    // --- TAMBAHKAN LOGIKA PENGURUTAN DI SINI ---
    if (currentTab === 'stok') {
        const grouped = result.reduce((acc, item) => {
            const nama = (item["Nama Barang"] || "").trim();
            if (!acc[nama]) {
                acc[nama] = { 
                    ...item, 
                    "Masuk": 0, 
                    "Keluar": 0, 
                    "Sisa Stok": 0,
                    // Pastikan mengambil harga beli terbaru (Kolom E)
                    "Harga Beli Terbaru": parseFloat(item["Harga Beli Terbaru"]) || 0 
                };
            }
            acc[nama]["Masuk"] += parseFloat(item["Masuk"]) || 0;
            acc[nama]["Keluar"] += parseFloat(item["Keluar"]) || 0;
            acc[nama]["Sisa Stok"] += parseFloat(item["Sisa Stok"]) || 0;
            return acc;
        }, {});

        result = Object.values(grouped).sort((a, b) => 
            a["Nama Barang"].localeCompare(b["Nama Barang"])
        );
    }
    // ------------------------------------------

    filteredData = result;
    document.getElementById('rowCounter').innerText = `${filteredData.length} DATA DITEMUKAN`;
    calculateStats(); 
    updatePagination();
    renderTableBody();
}

        function updatePagination() {
            const totalPages = Math.ceil(filteredData.length / rowsPerPage) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            document.getElementById('currentPageLabel').innerText = currentPage;
            document.getElementById('totalPagesLabel').innerText = totalPages;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
        }

        function renderTableBody() {
            const body = document.getElementById('tableBody');
            body.innerHTML = '';
            const startIndex = (currentPage - 1) * rowsPerPage;
            const paginatedData = filteredData.slice(startIndex, startIndex + rowsPerPage);

            if(paginatedData.length === 0) {
                body.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-slate-300 italic">Tidak ada data untuk ditampilkan</td></tr>`;
                return;
            }

            paginatedData.forEach((row) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors border-b border-slate-50 cursor-pointer active:bg-slate-100";
                tr.onclick = () => showDetail(row);
                
                let html = '';
                if (currentTab === 'transaksi') {
                    const m = parseFloat(row["Masuk"]) || 0;
                    const k = parseFloat(row["Keluar"]) || 0;
                    const isTransfer = (row["Kategori"] || "").toLowerCase() === "transfer saldo";
                    
                    html = `
                        <td class="px-4 py-3">
                            <div class="text-[8px] text-slate-400 font-bold mb-0.5 uppercase">${row["Waktu"]}</div>
                            <div class="font-bold text-slate-800 line-clamp-1">${isTransfer ? '<i class="fas fa-sync text-blue-400 mr-1"></i> ' : ''}${row["Keterangan"]}</div>
                            <div class="mt-1"><span class="px-1.5 py-0.5 bg-slate-100 text-slate-500 rounded text-[8px] font-black uppercase tracking-tighter">${row["Kategori"]}</span></div>
                        </td>
                        <td class="px-4 py-3 text-right font-bold ${isTransfer ? 'text-blue-500' : (m > 0 ? 'text-green-600' : 'text-red-600')}">${formatIDR(m > 0 ? m : k)}</td>
                    `;
                } else if (currentTab === 'piutang') {
                    html = `
                        <td class="px-4 py-3"><div class="font-bold text-slate-800">${row["Nama Pelanggan"]}</div><div class="text-[9px] text-slate-400 uppercase">${row["Waktu"]}</div></td>
                        <td class="px-4 py-3 text-right text-red-600 font-bold">${formatIDR(row["Sisa Piutang"])}</td>
                    `;
                } else if (currentTab === 'stok') {
                    const sisaStok = parseFloat(row["Sisa Stok"]) || 0;
                    const hargaBeli = parseFloat(row["Harga Beli Terbaru"]) || 0;
                    const nilaiStok = sisaStok * hargaBeli;

                    html = `
                        <td class="px-4 py-3">
                            <div class="font-bold text-slate-800">${row["Nama Barang"]}</div>
                            <div class="text-[9px] text-slate-400 mt-0.5">
                                HB: Rp ${hargaBeli.toLocaleString('id-ID')} | 
                                <span class="text-blue-500 font-bold">Nilai: Rp ${nilaiStok.toLocaleString('id-ID')}</span>
                            </div>
                        </td>
                        <td class="px-4 py-3 text-center">
                            <span class="px-2 py-1 bg-blue-50 text-blue-700 rounded-lg font-black">${sisaStok}</span>
                        </td>
                    `;
                }
                tr.innerHTML = html;
                body.appendChild(tr);
            });
            document.querySelector('.table-container').scrollTop = 0;
        }

        function renderContent() {
            const head = document.getElementById('tableHead');
            if (currentTab === 'transaksi') head.innerHTML = `<tr><th class="px-4 py-3">Transaksi</th><th class="px-4 py-3 text-right">Nominal</th></tr>`;
            else if (currentTab === 'piutang') head.innerHTML = `<tr><th class="px-4 py-3">Pelanggan</th><th class="px-4 py-3 text-right">Sisa</th></tr>`;
            else if (currentTab === 'stok') head.innerHTML = `<tr><th class="px-4 py-3">Barang</th><th class="px-4 py-3 text-center">Stok</th></tr>`;
            applyFilter();
        }

        function prevPage() { if (currentPage > 1) { currentPage--; updatePagination(); renderTableBody(); } }
        function nextPage() { if (currentPage < Math.ceil(filteredData.length / rowsPerPage)) { currentPage++; updatePagination(); renderTableBody(); } }

        function showDetail(data) {
            const modal = document.getElementById('detailModal');
            const content = document.getElementById('modalContent');
            const body = document.getElementById('modalBody');
            document.body.classList.add('modal-open');
            
            let html = '';
            if (currentTab === 'transaksi') {
                let itemsHtml = '<p class="text-slate-400 italic text-[11px]">Tidak ada rincian produk</p>';
                if (data["Detail JSON"]) {
                    try {
                        const items = JSON.parse(data["Detail JSON"]);
                        if (Array.isArray(items)) {
                            itemsHtml = `<div class="bg-slate-50 rounded-2xl border border-slate-100 overflow-hidden">
                                <table class="w-full text-[11px]">
                                    <thead class="bg-slate-100/50 text-slate-500 font-bold uppercase text-[8px]"><tr><th class="p-3 text-left">Item</th><th class="p-3 text-center">Qty</th><th class="p-3 text-right">Harga</th></tr></thead>
                                    <tbody class="divide-y divide-slate-100">${items.map(i => `<tr><td class="p-3 font-medium text-slate-700">${i.nama || '-'}</td><td class="p-3 text-center font-bold">${i.qty || 1}</td><td class="p-3 text-right font-black text-slate-900">${formatIDR(i.harga)}</td></tr>`).join('')}</tbody>
                                </table>
                            </div>`;
                        }
                    } catch(e) {}
                }
                html = `
                    <div class="space-y-6">
                        <div class="text-center pb-6 border-b border-slate-100">
                            <div class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mb-1">Total Nominal</div>
                            <div class="text-3xl font-black ${(data["Kategori"]||"").toLowerCase()==='transfer saldo' ? 'text-blue-600' : (data["Tipe"]==='MASUK'?'text-green-600':'text-red-600')}">${formatIDR(parseFloat(data["Masuk"]) || parseFloat(data["Keluar"]))}</div>
                        </div>
                        <div class="grid grid-cols-2 gap-6">
                            <div><label class="text-[8px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Waktu</label><p class="text-xs font-bold text-slate-800">${data["Waktu"]}</p></div>
                            <div><label class="text-[8px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Kategori</label><p class="text-xs font-bold text-slate-800 uppercase">${data["Kategori"]}</p></div>
                        </div>
                        <div><label class="text-[8px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Keterangan</label><p class="text-xs text-slate-600 font-medium leading-relaxed bg-slate-50 p-3 rounded-xl border border-slate-100">${data["Keterangan"]}</p></div>
                        <div><label class="text-[8px] font-bold text-slate-400 uppercase tracking-wider block mb-2">Rincian Pembelian</label>${itemsHtml}</div>
                    </div>
                `;
            } else if (currentTab === 'piutang') {
                html = `
                    <div class="space-y-6 text-center">
                        <div><div class="text-[9px] text-slate-400 font-bold uppercase mb-1">Tagihan Belum Lunas</div><div class="text-3xl font-black text-red-600">${formatIDR(data["Sisa Piutang"])}</div></div>
                        <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100 text-left space-y-3">
                            <div class="flex justify-between text-xs"><span class="text-slate-400 font-bold uppercase text-[9px]">Nama Pelanggan</span><span class="font-bold text-slate-800">${data["Nama Pelanggan"]}</span></div>
                            <div class="flex justify-between text-xs"><span class="text-slate-400 font-bold uppercase text-[9px]">Total Invoice</span><span class="font-bold text-slate-800">${formatIDR(data["Total Tagihan"])}</span></div>
                            <div class="flex justify-between text-xs"><span class="text-slate-400 font-bold uppercase text-[9px]">Telah Dibayar</span><span class="font-bold text-green-600">${formatIDR(data["DP"])}</span></div>
                        </div>
                    </div>
                `;
            } else if (currentTab === 'stok') {
                const sisaStok = parseFloat(data["Sisa Stok"]) || 0;
                const hargaBeli = parseFloat(data["Harga Beli Terbaru"]) || 0;
                const nilaiStok = sisaStok * hargaBeli;

                html = `
                    <div class="space-y-6 text-center">
                        <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl text-2xl mb-2"><i class="fas fa-box"></i></div>
                        <h4 class="text-xl font-black text-slate-800 px-4">${data["Nama Barang"]}</h4>
                        
                        <div class="grid grid-cols-2 gap-3 px-4">
                            <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                <div class="text-[8px] text-slate-400 font-bold uppercase mb-1">Harga Beli Terbaru</div>
                                <div class="text-xs font-bold text-slate-700">Rp ${hargaBeli.toLocaleString('id-ID')}</div>
                            </div>
                            <div class="bg-blue-50 p-3 rounded-xl border border-blue-100">
                                <div class="text-[8px] text-blue-400 font-bold uppercase mb-1">Total Nilai Stok</div>
                                <div class="text-xs font-bold text-blue-700">Rp ${nilaiStok.toLocaleString('id-ID')}</div>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-3 bg-slate-50 p-5 rounded-2xl border border-slate-100">
                            <div><div class="text-[8px] text-slate-400 font-bold uppercase mb-1">Masuk</div><div class="text-xs font-bold text-green-600">${data["Masuk"]}</div></div>
                            <div><div class="text-[8px] text-slate-400 font-bold uppercase mb-1">Keluar</div><div class="text-xs font-bold text-red-600">${data["Keluar"]}</div></div>
                            <div><div class="text-[8px] text-slate-400 font-bold uppercase mb-1">Tersedia</div><div class="text-lg font-black text-blue-600">${data["Sisa Stok"]}</div></div>
                        </div>
                        <div class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Update: ${data["Update Terakhir"]}</div>
                    </div>
                `;
            }

            body.innerHTML = html;
            modal.classList.remove('hidden');
            setTimeout(() => { content.classList.remove('translate-y-full', 'scale-95', 'opacity-0'); }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('detailModal');
            const content = document.getElementById('modalContent');
            document.body.classList.remove('modal-open');
            content.classList.add('translate-y-full', 'scale-95', 'opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); }, 250);
        }

        window.onclick = function(e) { if (e.target == document.getElementById('detailModal')) closeModal(); }
        window.onload = fetchAllData;
    </script>
</body>
</html>
