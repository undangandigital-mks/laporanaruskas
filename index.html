    <script>
        const URLS = {
            transaksi: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvAQXltAVp8lnrXXVVPJr1hYEi8cAJrqz182qT23eaiI8t-MoBrEtE7bAAJqKEyKKTig4hpA9DNuQB/pub?gid=2057149863&single=true&output=csv",
            piutang: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvAQXltAVp8lnrXXVVPJr1hYEi8cAJrqz182qT23eaiI8t-MoBrEtE7bAAJqKEyKKTig4hpA9DNuQB/pub?gid=1961183383&single=true&output=csv",
            stok: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvAQXltAVp8lnrXXVVPJr1hYEi8cAJrqz182qT23eaiI8t-MoBrEtE7bAAJqKEyKKTig4hpA9DNuQB/pub?gid=1595956432&single=true&output=csv"
        };

        let currentTab = 'transaksi';
        let db = { transaksi: [], piutang: [], stok: [] };
        let currentPage = 1;
        const rowsPerPage = 50;
        let filteredData = [];
        let dateFilterMode = 'all';

        function formatIDR(val) {
            const num = parseFloat(val) || 0;
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
        }

        function switchTab(tab) {
    // 1. Reset State Global
    currentTab = tab;
    currentPage = 1;

    // 2. Definisi elemen utama dashboard
    const statsGrid = document.getElementById('statsGrid');
    const filterContainer = document.querySelector('.bg-white.p-4.rounded-xl.card-shadow');
    const tableContainer = document.querySelector('.bg-white.rounded-xl.card-shadow.overflow-hidden');
    const mainDashboardElements = [statsGrid, filterContainer, tableContainer];

    // 3. Sembunyikan SEMUA halaman laporan khusus (page-content)
    document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));

    // 4. Update Visual Tombol Navigasi
    document.querySelectorAll('[id^="tab-"]').forEach(btn => {
        btn.classList.remove('tab-active', 'text-blue-600', 'font-bold');
        btn.classList.add('text-slate-500');
    });

    // 5. Logika Percabangan Tampilan
    if (tab === 'kas' || tab === 'labarugi') {
        // --- MODE LAPORAN ---
        // Sembunyikan elemen dashboard utama
        mainDashboardElements.forEach(el => el?.classList.add('hidden'));
        
        const targetPage = document.getElementById(tab + 'Page');
        if (targetPage) targetPage.classList.remove('hidden');

        if (tab === 'kas') {
            renderLaporanKas();
        } else {
            if(document.getElementById('lrDateStart')) {
                document.getElementById('lrDateStart').value = document.getElementById('dateStart').value;
                document.getElementById('lrDateEnd').value = document.getElementById('dateEnd').value;
            }
            renderLabaRugi();
        }
    } else {
        // --- MODE DATA (Transaksi, Piutang, Stok) ---
        // Tampilkan KEMBALI elemen dashboard utama
        mainDashboardElements.forEach(el => el?.classList.remove('hidden'));
        
        // Render Header Tabel & Isi Data
        renderContent(); 
    }

    // 6. Tandai Tombol yang Aktif
    const activeBtn = document.getElementById('tab-' + tab);
    if (activeBtn) {
        activeBtn.classList.add('tab-active', 'text-blue-600', 'font-bold');
        activeBtn.classList.remove('text-slate-500');
    }
}
        async function fetchAllData() {
            const btn = document.getElementById('refreshBtn');
            const loader = document.getElementById('loadingOverlay');
            btn.disabled = true;
            loader.classList.remove('hidden');

            try {
                const results = await Promise.all([
                    fetchCSV(URLS.transaksi),
                    fetchCSV(URLS.piutang),
                    fetchCSV(URLS.stok)
                ]);
                db.transaksi = results[0];
                db.piutang = results[1];
                db.stok = results[2];
                
                setDateFilter('all');
            } catch (e) {
                console.error("Gagal mengambil data:", e);
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        }

        function fetchCSV(url) {
            return new Promise((resolve, reject) => {
                Papa.parse(url, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => resolve(results.data),
                    error: (err) => reject(err)
                });
            });
        }


       function calculateStats() {
    let masuk = 0, keluar = 0, piutangTerfilter = 0, piutangTotalSemua = 0, totalRefund = 0;
    
    const excludedCategories = ["transfer saldo", "saldo awal"];
    const refundCategory = "pengembalian dana"; 

    const query = document.getElementById('searchInput').value.toLowerCase();
    const start = document.getElementById('dateStart').value;
    const end = document.getElementById('dateEnd').value;

    // 1. HITUNG TRANSAKSI (DENGAN FILTER)
    db.transaksi.forEach(r => {
        let pass = Object.values(r).some(v => String(v).toLowerCase().includes(query));
        if (pass && (start || end)) {
            const dateStr = r["Waktu"];
            if(dateStr) {
                const itemTime = new Date(dateStr).getTime();
                if(!isNaN(itemTime)) {
                    if(start) pass = pass && itemTime >= new Date(start).getTime();
                    if(end) pass = pass && itemTime <= new Date(end).setHours(23, 59, 59, 999);
                }
            }
        }
        
        if (pass) {
            const category = (r["Kategori"] || "").toLowerCase().trim();
            const isExcluded = excludedCategories.some(excluded => category.includes(excluded));
            
            if (!isExcluded) {
                const rMasuk = parseFloat(r["Masuk"]) || 0;
                const rKeluar = parseFloat(r["Keluar"]) || 0;

                if (category.includes(refundCategory)) {
                    totalRefund += rKeluar;
                } else {
                    masuk += rMasuk;
                    keluar += rKeluar;
                }
            }
        }
    });

    // 2. HITUNG PIUTANG (DUA LOGIKA)
    db.piutang.forEach(r => {
        const sisa = parseFloat(r["Sisa Piutang"]) || 0;
        const status = (r["Status"] || "").toLowerCase();
        
        if (sisa > 0 && status !== 'lunas') {
            // A. LOGIKA UNTUK KOTAK SISA PIUTANG (TANPA FILTER)
            piutangTotalSemua += sisa;

            // B. LOGIKA UNTUK TOTAL PENDAPATAN (DENGAN FILTER)
            let passPiutang = Object.values(r).some(v => String(v).toLowerCase().includes(query));
            if (passPiutang && (start || end)) {
                const dateStr = r["Waktu"]; // Pastikan ada kolom "Waktu" di tab Piutang
                if(dateStr) {
                    const itemTime = new Date(dateStr).getTime();
                    if(!isNaN(itemTime)) {
                        if(start) passPiutang = passPiutang && itemTime >= new Date(start).getTime();
                        if(end) passPiutang = passPiutang && itemTime <= new Date(end).setHours(23, 59, 59, 999);
                    }
                }
            }
            if (passPiutang) {
                piutangTerfilter += sisa;
            }
        }
    });

    // --- KALKULASI AKHIR ---
    
    // Pendapatan = (Uang Masuk Terfilter - Refund Terfilter) + Piutang Terfilter
    const pendapatanFinal = (masuk - totalRefund) + piutangTerfilter;
    
    // Laba Kotor = Uang Masuk Terfilter - (Keluar Terfilter + Refund Terfilter)
    const labaKotor = masuk - (keluar + totalRefund);

    // Update UI Dashboard
    document.getElementById('totalMasuk').innerText = formatIDR(pendapatanFinal);
    document.getElementById('totalKeluar').innerText = formatIDR(keluar); 
    document.getElementById('totalSaldo').innerText = formatIDR(labaKotor); 
    
    // Tampilan Sisa Piutang menggunakan total keseluruhan (tanpa filter)
    document.getElementById('totalPiutang').innerText = formatIDR(piutangTotalSemua);

    const saldoEl = document.getElementById('totalSaldo');
    saldoEl.className = labaKotor < 0 
        ? "text-xs md:text-lg font-bold text-red-600 truncate" 
        : "text-xs md:text-lg font-bold text-blue-700 truncate";
}
        
function renderLabaRugi() {
    const container = document.getElementById('labarugiContent');
    let pendapatan = 0, beban = 0, pengembalian = 0;

    // MEMBACA FILTER LOKAL LABA RUGI
    const start = document.getElementById('lrDateStart').value;
    const end = document.getElementById('lrDateEnd').value;

    db.transaksi.forEach(r => {
        let pass = true;
        
        // Filter Tanggal Lokal
        if (start || end) {
            const dateStr = r["Waktu"];
            if(dateStr) {
                const itemTime = new Date(dateStr).getTime();
                if(!isNaN(itemTime)) {
                    if(start) pass = pass && itemTime >= new Date(start).getTime();
                    if(end) pass = pass && itemTime <= new Date(end).setHours(23, 59, 59, 999);
                }
            } else { pass = false; }
        }

        if (pass) {
            const cat = (r["Kategori"] || "").toLowerCase().trim();
            if (cat.includes("pengembalian dana")) {
                pengembalian += parseFloat(r["Keluar"]) || 0;
            } else if (!["transfer saldo", "saldo awal"].some(ex => cat.includes(ex))) {
                pendapatan += parseFloat(r["Masuk"]) || 0;
                beban += parseFloat(r["Keluar"]) || 0;
            }
        }
    });

    const pendapatanBersih = pendapatan - pengembalian;
    const labaBersih = pendapatanBersih - beban;

    // Render tampilan seperti sebelumnya...
    container.innerHTML = `
        <div class="mb-4 text-[10px] font-bold text-blue-600 uppercase tracking-widest">
            Analisis Periode: ${start || 'Semua'} - ${end || 'Sekarang'}
        </div>
        <div class="space-y-4">
            <div class="flex justify-between border-b border-slate-100 pb-3">
                <span class="text-sm text-slate-600">Pendapatan Kotor</span>
                <span class="text-sm font-bold text-green-600">${formatIDR(pendapatan)}</span>
            </div>
            <div class="flex justify-between border-b border-slate-100 pb-3">
                <span class="text-sm text-slate-600">Pengembalian Dana</span>
                <span class="text-sm font-bold text-red-500">-${formatIDR(pengembalian)}</span>
            </div>
            <div class="flex justify-between items-center bg-slate-50 p-3 rounded-lg font-bold">
                <span class="text-sm text-slate-700">Total Pendapatan Bersih</span>
                <span class="text-sm text-slate-900">${formatIDR(pendapatanBersih)}</span>
            </div>
            <div class="flex justify-between border-b border-slate-100 pb-3 pt-2">
                <span class="text-sm text-slate-600">Beban Operasional</span>

function renderLaporanKas() {
    const container = document.getElementById('kasContent'); 
    
    let data = { 
        saldoAwal: 0,
        penjualanLangsung: 0, 
        cicilanPiutang: 0,
        sisaPiutang: 0, 
        pembelian: 0, 
        operasional: 0, 
        saldo: 0,
        cash: 0,
        rekening: 0
    };

    // 1. Hitung Saldo & Kategori dari Transaksi
    db.transaksi.forEach(row => {
        const masuk = parseFloat(row["Masuk"]) || 0;
        const keluar = parseFloat(row["Keluar"]) || 0;
        const kategori = (row["Kategori"] || "").toLowerCase();
        const metode = (row["Metode"] || "cash").toLowerCase();
        const netto = masuk - keluar;

        if (kategori.includes("saldo awal")) {
            data.saldoAwal += masuk;
        }

        // PENDAPATAN (Filter: Bukan saldo awal, bukan transfer, bukan cancel)
        if (masuk > 0 && !kategori.includes("saldo awal") && !kategori.includes("transfer") && !kategori.includes("cancel order")) {
            if (kategori.includes("cicilan") || kategori.includes("piutang")) {
                data.cicilanPiutang += masuk;
            } else {
                data.penjualanLangsung += masuk;
            }
        }
        
        // PENGELUARAN (Filter: Bukan transfer, bukan refund)
        if (keluar > 0) {
            if (kategori.includes("beli") || kategori.includes("stok")) {
                data.pembelian += keluar;
            } else if (!kategori.includes("transfer") && !kategori.includes("pengembalian dana")) {
                data.operasional += keluar;
            }
        }

        // Akumulasi Saldo Real (Sesuai mutasi kas/bank)
        if (metode.includes("rekening") || metode.includes("bank") || metode.includes("tf")) {
            data.rekening += netto;
        } else {
            data.cash += netto;
        }
        data.saldo += netto;
    });

    // 2. Hitung Sisa Piutang dari database piutang
    db.piutang.forEach(row => {
        data.sisaPiutang += parseFloat(row["Sisa Piutang"] || row["Sisa"] || 0);
    });

    // --- LOGIKA BARU AGAR SINKRON ---
    
    // Total Penjualan murni (Semua yang sudah jadi uang masuk dari penjualan)
    const totalPenjualanUangMasuk = data.penjualanLangsung + data.cicilanPiutang;
    
    // Total Pendapatan Kas = Saldo Awal + Uang Masuk Penjualan
    const totalPendapatanKas = data.saldoAwal + totalPenjualanUangMasuk;
    
    // Total Pengeluaran Kas
    const totalSemuaPengeluaran = data.pembelian + data.operasional;

    container.innerHTML = `
        <div class="space-y-6 animate-fade col-span-full">
            <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-8 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden text-center">
                <p class="text-xs font-bold uppercase opacity-80 tracking-widest mb-2">Total Saldo Kas (Real)</p>
                <h2 class="text-4xl font-black">${formatIDR(data.saldo)}</h2>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white p-5 rounded-3xl border border-slate-100 card-shadow text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Saldo Tunai</p>
                    <p class="text-sm font-black text-slate-800">${formatIDR(data.cash)}</p>
                </div>
                <div class="bg-white p-5 rounded-3xl border border-slate-100 card-shadow text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Rekening</p>
                    <p class="text-sm font-black text-slate-800">${formatIDR(data.rekening)}</p>
                </div>
            </div>

            <div class="bg-white rounded-3xl border border-slate-100 card-shadow overflow-hidden">
                <table class="w-full text-left">
                    <tbody class="divide-y divide-slate-50">
                        <tr class="bg-slate-50/50">
                            <td colspan="2" class="p-4 text-[10px] font-black text-blue-600 uppercase tracking-widest">Alur Kas Masuk</td>
                        </tr>
                        <tr>
                            <td class="p-4 text-sm text-slate-600">Saldo Awal</td>
                            <td class="p-4 text-right text-sm font-bold text-slate-800">${formatIDR(data.saldoAwal)}</td>
                        </tr>
                        <tr>
                            <td class="p-4 text-sm text-slate-600">Penjualan (Uang Masuk)</td>
                            <td class="p-4 text-right text-sm font-bold text-slate-800">${formatIDR(totalPenjualanUangMasuk)}</td>
                        </tr>
                        <tr class="bg-blue-50/30">
                            <td class="p-4 text-sm font-bold text-slate-700">Total Kas Masuk</td>
                            <td class="p-4 text-right text-sm font-black text-blue-700">${formatIDR(totalPendapatanKas)}</td>
                        </tr>

                        <tr class="bg-slate-50/50">
                            <td colspan="2" class="p-4 text-[10px] font-black text-red-600 uppercase tracking-widest">Alur Kas Keluar</td>
                        </tr>
                        <tr>
                            <td class="p-4 text-sm text-slate-600">Total Pembelian</td>
                            <td class="p-4 text-right text-sm font-bold text-slate-800">${formatIDR(data.pembelian)}</td>

        function handleSearch() { currentPage = 1; applyFilter(); }

        function setDateFilter(mode) {
            dateFilterMode = mode;
            currentPage = 1;
            const startInput = document.getElementById('dateStart');
            const endInput = document.getElementById('dateEnd');
            const now = new Date();

            const formatDate = (date) => {
                const d = new Date(date);
                if (isNaN(d.getTime())) return '';
                let month = '' + (d.getMonth() + 1);
                let day = '' + d.getDate();
                let year = d.getFullYear();
                if (month.length < 2) month = '0' + month;
                if (day.length < 2) day = '0' + day;
                return [year, month, day].join('-');
            };

            if (mode === 'today') {
                const todayStr = formatDate(now);
                startInput.value = todayStr;
                endInput.value = todayStr;
            } else if (mode === 'month') {
                const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
                let lastTransDate = new Date(now.getFullYear(), now.getMonth() + 1, 0); 
                
                if (db.transaksi && db.transaksi.length > 0) {
                    const currentMonth = now.getMonth();
                    const currentYear = now.getFullYear();
                    const monthDates = db.transaksi
                        .map(r => new Date(r["Waktu"]))
                        .filter(d => !isNaN(d.getTime()) && d.getMonth() === currentMonth && d.getFullYear() === currentYear);
                    if (monthDates.length > 0) lastTransDate = new Date(Math.max(...monthDates.map(d => d.getTime())));
                }
                startInput.value = formatDate(firstDay);
                endInput.value = formatDate(lastTransDate);
            } else if (mode === 'all') {
                if (db.transaksi && db.transaksi.length > 0) {
                    const dates = db.transaksi.map(r => new Date(r["Waktu"]).getTime()).filter(t => !isNaN(t));
                    if (dates.length > 0) {
                        startInput.value = formatDate(new Date(Math.min(...dates)));
                        endInput.value = formatDate(new Date(Math.max(...dates)));
                    }
                }
            }

            ['all', 'today', 'month'].forEach(m => {
                document.getElementById(`btn-date-${m}`).classList.toggle('filter-btn-active', m === mode);
            });

            applyFilter();
        }

        function handleDateChange() {
            dateFilterMode = 'custom';
            ['all', 'today', 'month'].forEach(m => {
                document.getElementById(`btn-date-${m}`).classList.remove('filter-btn-active');
            });
            currentPage = 1;
            applyFilter();
        }

        function resetDateRange() { setDateFilter('all'); }

        function applyFilter() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const startVal = document.getElementById('dateStart').value;
    const endVal = document.getElementById('dateEnd').value;

    let data = db[currentTab] || [];
    
    // 1. Filter berdasarkan pencarian kata kunci
    let result = data.filter(row => Object.values(row).some(v => String(v).toLowerCase().includes(query)));

    // 2. Filter khusus Piutang (hanya yang belum lunas)
    if (currentTab === 'piutang') {
        result = result.filter(row => (parseFloat(row["Sisa Piutang"]) || 0) > 0);
    }

    // 3. Filter berdasarkan Tanggal (kecuali tab stok)
    if (currentTab !== 'stok' && (startVal || endVal)) {
        result = result.filter(row => {
            const dateStr = row["Waktu"] || row["Update Terakhir"];
            if(!dateStr) return true;
            const itemTime = new Date(dateStr).getTime();
            if(isNaN(itemTime)) return true;
            
            let pass = true;
            if(startVal) pass = pass && itemTime >= new Date(startVal).getTime();
            if(endVal) pass = pass && itemTime <= new Date(endVal).setHours(23, 59, 59, 999);
            return pass;
        });
    }

    // --- TAMBAHKAN LOGIKA PENGURUTAN DI SINI ---
    if (currentTab === 'stok') {
    // Proses Grouping (Menyatukan nama yang sama)
    const grouped = result.reduce((acc, item) => {
        const nama = (item["Nama Barang"] || "").trim(); // .trim() menghapus spasi tak sengaja
        if (!acc[nama]) {
            acc[nama] = { ...item, 
                "Masuk": 0, 
                "Keluar": 0, 
                "Sisa Stok": 0 
            };
        }
        acc[nama]["Masuk"] += parseFloat(item["Masuk"]) || 0;
        acc[nama]["Keluar"] += parseFloat(item["Keluar"]) || 0;
        acc[nama]["Sisa Stok"] += parseFloat(item["Sisa Stok"]) || 0;
        return acc;
    }, {});

    // Ubah kembali menjadi Array dan Urutkan Abjad
    result = Object.values(grouped).sort((a, b) => 
        a["Nama Barang"].localeCompare(b["Nama Barang"])
    );
}
    // ------------------------------------------

    filteredData = result;
    document.getElementById('rowCounter').innerText = `${filteredData.length} DATA DITEMUKAN`;
    calculateStats(); 
    updatePagination();
    renderTableBody();
}

        function updatePagination() {

            if (currentPage > totalPages) currentPage = totalPages;
            document.getElementById('currentPageLabel').innerText = currentPage;
            document.getElementById('totalPagesLabel').innerText = totalPages;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
        }
