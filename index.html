window.SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzuQ6eLJUKjAVyfXctmia7_QhHjm8pRlN8va81kABVu0oXRF8kNr7lcJwkvp4yBnXw/exec";

function triggerShopeeImport(action) {
    currentShopeeAction = action;
    document.getElementById('shopeeInput').click();
}

// Hubungkan input file dengan event listener
document.getElementById('shopeeInput').onchange = function() {
    if (this.files && this.files[0]) {
        processShopeeExcel(this.files[0], currentShopeeAction);
        this.value = ''; 
    }
};

async function processShopeeExcel(file, actionTarget) {
    if (!file) return;
    const btn = document.querySelector(".bg-orange-500");
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i> Memproses...';
    btn.disabled = true;

    const reader = new FileReader();
    reader.onload = async (e) => {
        try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const worksheet = workbook.Sheets["Income"];
            if (!worksheet) throw new Error("Sheet 'Income' tidak ditemukan.");

            const rawData = XLSX.utils.sheet_to_json(worksheet, { range: 5 });
            const shopeeDataToSave = rawData.filter(row => row['No. Pesanan']).map(row => {
                const parseVal = (v) => typeof v === 'number' ? v : (parseFloat(String(v).replace(/[^\d.-]/g, '')) || 0);
                return {
                    tgl_cair: row['Tanggal Dana Dilepaskan'] || '',
                    no_pesanan: row['No. Pesanan'],
                    sku: row['Username (Pembeli)'] || '',
                    omzet_bruto: parseVal(row['Harga Asli Produk']) - Math.abs(parseVal(row['Jumlah Pengembalian Dana ke Pembeli'])) - Math.abs(parseVal(row['Total Diskon Produk'])),
                    total_potongan: Math.abs(parseVal(row['Biaya Administrasi']) + parseVal(row['Biaya Layanan']) + parseVal(row['Biaya Proses Pesanan'])),
                    net_income: parseVal(row['Total Penghasilan'])
                };
            });

            await fetch(window.SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: actionTarget, data: shopeeDataToSave })
            });

            const namaAkun = actionTarget === 'insertShopeeData' ? "Akun 1" : "Akun 2";
            alert(`Berhasil mengimpor data ${namaAkun}!`);
            if (typeof fetchAllData === "function") fetchAllData();
        } catch (err) {
            alert("Error: " + err.message);
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    };
    reader.readAsArrayBuffer(file);
}

            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);

 function switchTab(tab) {
    // 1. Reset State Global
    currentTab = tab;
    currentPage = 1;

    // 2. Definisi elemen utama dashboard
    const statsGrid = document.getElementById('statsGrid');
    const filterContainer = document.querySelector('.bg-white.p-4.rounded-xl.card-shadow');
    const tableContainer = document.querySelector('.bg-white.rounded-xl.card-shadow.overflow-hidden');
    const mainDashboardElements = [statsGrid, filterContainer, tableContainer];

    // Target elemen filter spesifik berdasarkan kode Anda
    const dateQuickFilters = document.querySelector('.flex.gap-2.overflow-x-auto'); // Container tombol Semua, Hari Ini, dll
    const dateInputSection = document.getElementById('dateStart')?.closest('.grid.grid-cols-2'); // Container Input Tanggal
    const btnResetRange = document.querySelector('button[onclick="resetDateRange()"]')?.parentElement; // Container Reset Kalender

    // 3. Sembunyikan SEMUA halaman laporan khusus (page-content)
    document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));

    // 4. Update Visual Tombol Navigasi Tab Utama
    document.querySelectorAll('[id^="tab-"]').forEach(btn => {
        btn.classList.remove('tab-active', 'text-blue-600', 'font-bold');
        btn.classList.add('text-slate-500');
    });

    // 5. Logika Percabangan Tampilan
    if (tab === 'kas' || tab === 'labarugi') {
        // --- MODE LAPORAN (Saldo Kas & Laba Rugi) ---
        mainDashboardElements.forEach(el => el?.classList.add('hidden'));
        const targetPage = document.getElementById(tab + 'Page');
        if (targetPage) targetPage.classList.remove('hidden');

        if (tab === 'kas') {
            renderLaporanKas();
        } else {
            if(document.getElementById('lrDateStart')) {
                document.getElementById('lrDateStart').value = document.getElementById('dateStart').value;
                document.getElementById('lrDateEnd').value = document.getElementById('dateEnd').value;
            }
            renderLabaRugi();
        }
    } else {
        // --- MODE DATA (Transaksi, Piutang, Stok) ---
        mainDashboardElements.forEach(el => el?.classList.remove('hidden'));

        // LOGIKA PEMBERSIHAN FILTER TANGGAL (AGRESIF UNTUK STOK & PIUTANG)
        if (tab === 'stok' || tab === 'piutang') {
            if (dateQuickFilters) dateQuickFilters.classList.add('hidden');
            if (dateInputSection) dateInputSection.classList.add('hidden');
            if (btnResetRange) btnResetRange.classList.add('hidden');
            
            // Netralkan nilai filter agar data tidak terpotong oleh filter tanggal sebelumnya
            document.getElementById('dateStart').value = "";
            document.getElementById('dateEnd').value = "";
        } else {
            // Tampilkan kembali elemen filter jika kembali ke tab Transaksi/Semua
            if (dateQuickFilters) dateQuickFilters.classList.remove('hidden');
            if (dateInputSection) dateInputSection.classList.remove('hidden');
            if (btnResetRange) btnResetRange.classList.remove('hidden');
        }

        // KHUSUS TAB STOK: Tampilkan Kartu Total Nilai Aset
        if (tab === 'stok') {
            statsGrid.innerHTML = `
                <div class="col-span-full bg-white p-6 rounded-2xl shadow-sm border border-blue-100 flex items-center justify-between">
                    <div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Total Nilai Aset Stok</p>
                        <h3 id="totalAsetStok" class="text-2xl font-black text-blue-600">Rp 0</h3>
                    </div>
                    <div class="w-12 h-12 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center text-xl">
                        <i class="fas fa-boxes-stacked"></i>
                    </div>
                </div>
            `;
        } else {
            // STRUKTUR 4 KARTU UNTUK TRANSAKSI/PIUTANG
            statsGrid.innerHTML = `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Pendapatan</p>
                    <h3 id="totalMasuk" class="text-sm font-bold text-slate-800">Rp 0</h3>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Pengeluaran</p>

        const [shopeeRes1, shopeeRes2] = await Promise.all([
            fetch(`${window.SCRIPT_URL}?action=getShopeeData`),
            fetch(`${window.SCRIPT_URL}?action=getShopeeData2`)
        ]);

        const shopeeJson1 = await shopeeRes1.json();
        const shopeeJson2 = await shopeeRes2.json();

        function fetchCSV(url) {
            return new Promise((resolve, reject) => {

                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => resolve(results.data),
                    error: (err) => reject(err)
                });
            });
        }

      function calculateStats() {
    const statsGrid = document.getElementById('statsGrid');

    // --- LOGIKA KHUSUS TAB STOK ---
    if (currentTab === 'stok') {
        statsGrid.classList.remove('hidden');
        
        let totalAsetStok = 0;
        const query = document.getElementById('searchInput').value.toLowerCase();

        // Hitung total aset berdasarkan data yang terlihat (terfilter)
        db.stok.forEach(item => {
            const nama = (item["Nama Barang"] || "").toLowerCase();
            const pass = nama.includes(query);

            if (pass) {
                const sisa = parseFloat(item["Sisa Stok"]) || 0;
                const harga = parseFloat(item["Harga Beli Terbaru"]) || 0;
                // Jika stok minus, nilai aset dianggap 0 (sesuai instruksi sebelumnya)
                totalAsetStok += (Math.max(0, sisa) * harga);
            }
        });

        // Update UI khusus kartu Total Aset
        const elAset = document.getElementById('totalAsetStok');
        if (elAset) {
            elAset.innerText = formatIDR(totalAsetStok);
        }
        return; // Berhenti di sini jika di tab stok
    } 

    // --- LOGIKA TAB TRANSAKSI / PIUTANG ---
    statsGrid.classList.remove('hidden');
            
    let masuk = 0, keluar = 0, piutangTerfilter = 0, piutangTotalSemua = 0, totalRefund = 0;
    
    const excludedCategories = ["transfer saldo", "saldo awal"];
    const refundCategory = "pengembalian dana"; 

    const query = document.getElementById('searchInput').value.toLowerCase();
    const start = document.getElementById('dateStart').value;
    const end = document.getElementById('dateEnd').value;

    // 1. HITUNG TRANSAKSI (DENGAN FILTER)
    db.transaksi.forEach(r => {
        let pass = Object.values(r).some(v => String(v).toLowerCase().includes(query));
        if (pass && (start || end)) {
            const dateStr = r["Waktu"];
            if(dateStr) {
                const itemTime = new Date(dateStr).getTime();
                if(!isNaN(itemTime)) {
                    if(start) pass = pass && itemTime >= new Date(start).getTime();
                    if(end) pass = pass && itemTime <= new Date(end).setHours(23, 59, 59, 999);
                }
            }
        }
        
        if (pass) {
            const category = (r["Kategori"] || "").toLowerCase().trim();
            const isExcluded = excludedCategories.some(excluded => category.includes(excluded));
            
            if (!isExcluded) {
                const rMasuk = parseFloat(r["Masuk"]) || 0;
                const rKeluar = parseFloat(r["Keluar"]) || 0;

                if (category.includes(refundCategory)) {
                    totalRefund += rKeluar;
                } else {
                    masuk += rMasuk;
                    keluar += rKeluar;
                }
            }
        }
    });

    // 2. HITUNG PIUTANG (DENGAN FILTER)
    db.piutang.forEach(r => {
        const sisa = parseFloat(r["Sisa Piutang"]) || 0;
        const status = (r["Status"] || "").toLowerCase();
        
        if (sisa > 0 && status !== 'lunas') {
            piutangTotalSemua += sisa;

            let passPiutang = Object.values(r).some(v => String(v).toLowerCase().includes(query));
            if (passPiutang && (start || end)) {
                const dateStr = r["Waktu"];
                if(dateStr) {
                    const itemTime = new Date(dateStr).getTime();
                    if(!isNaN(itemTime)) {
                        if(start) passPiutang = passPiutang && itemTime >= new Date(start).getTime();
                        if(end) passPiutang = passPiutang && itemTime <= new Date(end).setHours(23, 59, 59, 999);
                    }
                }
            }
            if (passPiutang) {
                piutangTerfilter += sisa;
            }
        }
    });

    // --- KALKULASI AKHIR ---
    const pendapatanFinal = (masuk - totalRefund) + piutangTerfilter;
    const labaKotor = masuk - (keluar + totalRefund);

    // Update UI Dashboard (Pastikan ID elemen sesuai dengan HTML statsGrid baru)
    if (document.getElementById('totalMasuk')) document.getElementById('totalMasuk').innerText = formatIDR(pendapatanFinal);
    if (document.getElementById('totalKeluar')) document.getElementById('totalKeluar').innerText = formatIDR(keluar); 
    
    const saldoEl = document.getElementById('totalSaldo');
    if (saldoEl) {
        saldoEl.innerText = formatIDR(labaKotor); 
        saldoEl.className = labaKotor < 0 
            ? "text-xs md:text-lg font-bold text-red-600 truncate" 
            : "text-xs md:text-lg font-bold text-blue-700 truncate";
    }
    
    if (document.getElementById('totalPiutang')) document.getElementById('totalPiutang').innerText = formatIDR(piutangTotalSemua);
}
        
function renderLabaRugi() {
    const container = document.getElementById('labarugiContent');
    
    // Inisialisasi Variabel
    let pendapatanTunai = 0;
    let sisaPiutangPeriodeIni = 0;
    let beban = 0;
    let pengembalian = 0;
    
    // Variabel Khusus Shopee (Akun 1 & 2)
    let omzetShopee1 = 0;
    let potonganShopee1 = 0;
    let omzetShopee2 = 0;
    let potonganShopee2 = 0;

    // 1. Ambil Filter Tanggal
    const startInput = document.getElementById('lrDateStart').value;
    const endInput = document.getElementById('lrDateEnd').value;
    
    const startTime = startInput ? new Date(startInput).getTime() : -Infinity;
    const endTime = endInput ? new Date(endInput).setHours(23, 59, 59, 999) : Infinity;

    // 2. HITUNG PIUTANG (Hanya periode ini)
    if (db.piutang) {
        db.piutang.forEach(p => {
            const pDate = new Date(p["Waktu"]).getTime();
            if (!isNaN(pDate) && pDate >= startTime && pDate <= endTime) {
                const totalTagihan = parseFloat(p["Total Tagihan"]) || 0;
                const dp = parseFloat(p["DP"]) || 0;
                sisaPiutangPeriodeIni += (totalTagihan - dp);
            }
        });
    }

    // 3. HITUNG TRANSAKSI (Cash Flow)
    db.transaksi.forEach(r => {
        const itemTime = new Date(r["Waktu"]).getTime();
        if (!isNaN(itemTime) && itemTime >= startTime && itemTime <= endTime) {
            const cat = (r["Kategori"] || "").toLowerCase().trim();
            const ket = (r["Keterangan"] || "").toLowerCase().trim();

            if (
                ["transfer saldo", "saldo awal"].some(ex => cat.includes(ex)) || 
                ket.includes("tarik dana shopee") // Menutup shopee1 & shopee2
            ) {
                return; 
            }

            if (cat.includes("pengembalian dana")) {
                pengembalian += parseFloat(r["Keluar"]) || 0;
            } else {
                if (!cat.includes("cicilan piutang")) {
                    pendapatanTunai += parseFloat(r["Masuk"]) || 0;
                }
                beban += parseFloat(r["Keluar"]) || 0;
            }
        }
    });

    // Fungsi Pembantu parsing angka
    const parseAmount = (val) => {
        if (typeof val === 'number') return val;
        if (!val) return 0;
        return parseFloat(String(val).replace(/[^\d.-]/g, '')) || 0;
    };

    // 4. HITUNG DATA SHOPEE (AKUN 1 & 2)
    const filterStart = startInput ? new Date(startInput).setHours(0, 0, 0, 0) : -Infinity;
    const filterEnd = endInput ? new Date(endInput).setHours(23, 59, 59, 999) : Infinity;

    const processShopee = (dataArray, target) => {
        if (dataArray && Array.isArray(dataArray)) {
            dataArray.forEach(s => {
                const rawDate = s['Tgl Cair'] || s.tgl_cair; 
                if (!rawDate) return;
                const cleanDateStr = String(rawDate).substring(0, 10);
                const sDate = new Date(cleanDateStr).setHours(0, 0, 0, 0);

                if (sDate >= filterStart && sDate <= filterEnd) {
                    const bruto = parseAmount(s['Bruto'] || s.omzet_bruto);
                    const potongan = parseAmount(s['Potongan'] || s.total_potongan);
                    if (target === 1) { omzetShopee1 += bruto; potonganShopee1 += potongan; }
                    else { omzetShopee2 += bruto; potonganShopee2 += potongan; }
                }
            });
        }
    };

    processShopee(db.shopee_income, 1);
    processShopee(db.shopee_income2, 2);

    // 5. KALKULASI AKHIR
    const totalOmzetShopee = omzetShopee1 + omzetShopee2;
    const totalPotonganShopee = potonganShopee1 + potonganShopee2;
    
    const pendapatanKotorTotal = pendapatanTunai + sisaPiutangPeriodeIni + totalOmzetShopee;
    const totalBebanGabungan = beban + totalPotonganShopee;
    const pendapatanBersih = pendapatanKotorTotal - pengembalian;
    const labaBersih = pendapatanBersih - totalBebanGabungan;

    // 6. RENDER TAMPILAN
    container.innerHTML = `
        <div class="mb-4 text-[10px] font-bold text-blue-600 uppercase tracking-widest">
            Analisis Periode: ${startInput || 'Semua'} - ${endInput || 'Sekarang'}
        </div>
        <div class="space-y-4">
            <div class="flex justify-between border-b border-slate-100 pb-2">
                <span class="text-sm text-slate-600">Penjualan Toko (Tunai)</span>
                <span class="text-sm font-medium text-slate-900">${formatIDR(pendapatanTunai)}</span>
            </div>
            <div class="flex justify-between border-b border-slate-100 pb-2">
                <span class="text-sm text-slate-600">Shopee 1 (Bruto)</span>
                <span class="text-sm font-medium text-orange-600">${formatIDR(omzetShopee1)}</span>
            </div>
            <div class="flex justify-between border-b border-slate-100 pb-2">
                <span class="text-sm text-slate-600">Shopee 2 (Bruto)</span>
                <span class="text-sm font-medium text-orange-600">${formatIDR(omzetShopee2)}</span>
            </div>
            <div class="flex justify-between border-b border-slate-100 pb-2">
                <span class="text-sm text-slate-600">Piutang Pelanggan</span>
                <span class="text-sm font-medium text-blue-500">+${formatIDR(sisaPiutangPeriodeIni)}</span>
            </div>
            <div class="flex justify-between border-b border-slate-100 pb-3 font-bold bg-slate-50 p-2 rounded-lg mt-2">
                <span class="text-sm text-slate-700">Total Omzet Kotor</span>
                <span class="text-sm text-green-600">${formatIDR(pendapatanKotorTotal)}</span>
            </div>

            <div class="pt-2">
                <div class="flex justify-between text-xs text-slate-500 mb-1">
                    <span>Beban Operasional Toko</span>
                    <span>-${formatIDR(beban)}</span>
                </div>
                <div class="flex justify-between text-xs text-slate-500 mb-1">
                    <span>Admin & Layanan Shopee 1</span>
                    <span>-${formatIDR(potonganShopee1)}</span>
                </div>
                <div class="flex justify-between text-xs text-slate-500 mb-1">
                    <span>Admin & Layanan Shopee 2</span>
                    <span>-${formatIDR(potonganShopee2)}</span>
                </div>
                <div class="flex justify-between text-xs text-red-500 mb-2">
                    <span>Retur / Pengembalian Dana</span>
                    <span>-${formatIDR(pengembalian)}</span>
                </div>
            </div>

            <div class="mt-6 p-4 rounded-2xl ${labaBersih >= 0 ? 'bg-blue-600 text-white' : 'bg-red-600 text-white'} shadow-lg transition-all">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-[10px] font-bold uppercase opacity-80">Laba / Rugi Bersih</p>
                        <h3 class="text-2xl font-black">${formatIDR(labaBersih)}</h3>
                    </div>
                    <i class="fas ${labaBersih >= 0 ? 'fa-chart-line' : 'fa-chart-bar'} text-3xl opacity-30"></i>
                </div>
            </div>
            
            <p class="text-[9px] text-center text-slate-400 italic">Data gabungan Muflih Print & Vi Printing.</p>
        </div>
    `;
}

async function processPembelianExcel(file) {
    if (!file) return;
    
    const btn = document.querySelector("button[onclick*='pembelianInput']");
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i> Memproses...';
    btn.disabled = true;

    const reader = new FileReader();
    reader.onload = async (e) => {
        try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const rawData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

            // Grouping berdasarkan Keterangan
            const grouped = rawData.reduce((acc, row) => {
                const ket = row['Keterangan'];
                if (!acc[ket]) {
                    acc[ket] = {
                        id: "TRX-" + Date.now() + Math.floor(Math.random() * 1000),
                        waktu: row['Waktu'] || new Date().toISOString().replace('T', ' ').split('.')[0],
                        tipe: "KELUAR",
                        kategori: "Pembelian",
                        metode: row['Metode'] || "Cash",
                        keterangan: ket,
                        masuk: 0,
                        keluar: 0,
                        subjek: row['Keterangan'].replace('Pembelian dari ', ''), // Ekstrak nama subjek jika ada
                        diskon: 0,
                        items: []
                    };
                }
                
                const harga = parseFloat(row['Harga Produk']) || 0;
                const qty = parseFloat(row['Qty']) || 0;
                const totalRow = parseFloat(row['Total Harga Produk']) || (harga * qty);

                acc[ket].keluar += totalRow;
                acc[ket].items.push({
                    nama: row['Nama Produk'],
                    qty: qty,
                    harga: harga
                });
                
                return acc;
            }, {});

            const finalData = Object.values(grouped).map(g => ({
                ...g,
                detail_json: JSON.stringify(g.items)
            }));

            if (finalData.length === 0) return alert("Data kosong");

            await fetch(window.SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'insertPembelianData',
                    data: finalData
                })
            });

            alert(`Berhasil mengimpor ${finalData.length} transaksi pembelian.`);
            if(typeof fetchAllData === 'function') fetchAllData(); 
        } catch (error) {
            console.error(error);
            alert("Gagal: Pastikan header Excel sesuai: Waktu, Keterangan, Nama Produk, Harga Produk, Qty, Total Harga Produk, Metode");
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    };
    reader.readAsArrayBuffer(file);
}

        function handleSearch() { currentPage = 1; applyFilter(); }

        function setDateFilter(mode) {
            dateFilterMode = mode;
            currentPage = 1;
            const startInput = document.getElementById('dateStart');
            const endInput = document.getElementById('dateEnd');
            const now = new Date();

            const formatDate = (date) => {
                const d = new Date(date);
                if (isNaN(d.getTime())) return '';
                let month = '' + (d.getMonth() + 1);
                let day = '' + d.getDate();
                let year = d.getFullYear();
                if (month.length < 2) month = '0' + month;
                if (day.length < 2) day = '0' + day;
                return [year, month, day].join('-');
            };

            if (mode === 'today') {
                const todayStr = formatDate(now);
                startInput.value = todayStr;
                endInput.value = todayStr;
            } else if (mode === 'month') {
                const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
                let lastTransDate = new Date(now.getFullYear(), now.getMonth() + 1, 0); 
                
                if (db.transaksi && db.transaksi.length > 0) {
                    const currentMonth = now.getMonth();
                    const currentYear = now.getFullYear();
                    const monthDates = db.transaksi
                        .map(r => new Date(r["Waktu"]))
                        .filter(d => !isNaN(d.getTime()) && d.getMonth() === currentMonth && d.getFullYear() === currentYear);
                    if (monthDates.length > 0) lastTransDate = new Date(Math.max(...monthDates.map(d => d.getTime())));
                }
                startInput.value = formatDate(firstDay);
                endInput.value = formatDate(lastTransDate);
            } else if (mode === 'all') {
                if (db.transaksi && db.transaksi.length > 0) {
                    const dates = db.transaksi.map(r => new Date(r["Waktu"]).getTime()).filter(t => !isNaN(t));
                    if (dates.length > 0) {
                        startInput.value = formatDate(new Date(Math.min(...dates)));
                        endInput.value = formatDate(new Date(Math.max(...dates)));
                    }
                }
            }

            ['all', 'today', 'month'].forEach(m => {
                document.getElementById(`btn-date-${m}`).classList.toggle('filter-btn-active', m === mode);
            });

            applyFilter();
        }

        function handleDateChange() {
            dateFilterMode = 'custom';
            ['all', 'today', 'month'].forEach(m => {
                document.getElementById(`btn-date-${m}`).classList.remove('filter-btn-active');
            });
            currentPage = 1;
            applyFilter();
        }

        function resetDateRange() { setDateFilter('all'); }

        function applyFilter() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const startVal = document.getElementById('dateStart').value;
    const endVal = document.getElementById('dateEnd').value;

    let data = db[currentTab] || [];
    
    // 1. Filter berdasarkan pencarian kata kunci
    let result = data.filter(row => Object.values(row).some(v => String(v).toLowerCase().includes(query)));

    // 2. Filter khusus Piutang (hanya yang belum lunas)
    if (currentTab === 'piutang') {
        result = result.filter(row => (parseFloat(row["Sisa Piutang"]) || 0) > 0);
    }

    // 3. Filter berdasarkan Tanggal (kecuali tab stok)
    if (currentTab !== 'stok' && (startVal || endVal)) {
        result = result.filter(row => {
            const dateStr = row["Waktu"] || row["Update Terakhir"];
            if(!dateStr) return true;
            const itemTime = new Date(dateStr).getTime();
            if(isNaN(itemTime)) return true;
            
            let pass = true;
            if(startVal) pass = pass && itemTime >= new Date(startVal).getTime();
            if(endVal) pass = pass && itemTime <= new Date(endVal).setHours(23, 59, 59, 999);
            return pass;
        });
    }

    // --- TAMBAHKAN LOGIKA PENGURUTAN DI SINI ---
    if (currentTab === 'stok') {
        const grouped = result.reduce((acc, item) => {
            const nama = (item["Nama Barang"] || "").trim();
            if (!acc[nama]) {
                acc[nama] = { 
                    ...item, 
                    "Masuk": 0, 
                    "Keluar": 0, 
                    "Sisa Stok": 0,
                    // Pastikan mengambil harga beli terbaru (Kolom E)
                    "Harga Beli Terbaru": parseFloat(item["Harga Beli Terbaru"]) || 0 
                };
            }
            acc[nama]["Masuk"] += parseFloat(item["Masuk"]) || 0;
            acc[nama]["Keluar"] += parseFloat(item["Keluar"]) || 0;
            acc[nama]["Sisa Stok"] += parseFloat(item["Sisa Stok"]) || 0;
            return acc;
        }, {});

        result = Object.values(grouped).sort((a, b) => 
            a["Nama Barang"].localeCompare(b["Nama Barang"])
        );
    }
    // ------------------------------------------

    filteredData = result;
    document.getElementById('rowCounter').innerText = `${filteredData.length} DATA DITEMUKAN`;
    calculateStats(); 
    updatePagination();
    renderTableBody();
}

            document.getElementById('nextBtn').disabled = currentPage === totalPages;
