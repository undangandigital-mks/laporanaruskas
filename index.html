<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViP Enterprise Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .card-shadow { box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .table-container { max-height: calc(100vh - 380px); overflow-y: auto; }
        @media (max-width: 640px) {
            .table-container { max-height: calc(100vh - 420px); }
            th, td { padding-left: 0.75rem !important; padding-right: 0.75rem !important; }
        }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 700; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-3 md:p-6">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="mb-5 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-xl md:text-2xl font-bold text-slate-800 flex items-center gap-2">
                    <i class="fas fa-chart-line text-blue-600"></i>
                    ViP Enterprise
                </h1>
                <p class="text-slate-500 text-xs md:text-sm">Monitoring Transaksi, Piutang & Stok</p>
            </div>
            <button onclick="fetchAllData()" id="refreshBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-xl font-medium transition-all flex items-center justify-center gap-2 shadow-md active:scale-95 text-sm">
                <i class="fas fa-sync-alt"></i> Sinkronisasi
            </button>
        </header>

        <!-- Tab Navigation -->
        <div class="flex border-b border-slate-200 mb-5 bg-white rounded-t-xl px-2 overflow-x-auto no-scrollbar">
            <button onclick="switchTab('transaksi')" id="tab-transaksi" class="px-4 md:px-6 py-3 text-xs md:text-sm font-medium transition-all tab-active whitespace-nowrap">
                <i class="fas fa-exchange-alt mr-1.5"></i>Transaksi
            </button>
            <button onclick="switchTab('piutang')" id="tab-piutang" class="px-4 md:px-6 py-3 text-xs md:text-sm font-medium transition-all text-slate-500 hover:text-blue-600 whitespace-nowrap">
                <i class="fas fa-hand-holding-usd mr-1.5"></i>Piutang (Aktif)
            </button>
            <button onclick="switchTab('stok')" id="tab-stok" class="px-4 md:px-6 py-3 text-xs md:text-sm font-medium transition-all text-slate-500 hover:text-blue-600 whitespace-nowrap">
                <i class="fas fa-boxes mr-1.5"></i>Stok
            </button>
        </div>

        <!-- Dashboard Stats -->
        <div id="statsGrid" class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-5">
            <div class="bg-white p-4 rounded-xl card-shadow border-l-4 border-green-500">
                <div class="text-[10px] font-bold text-slate-400 uppercase leading-tight mb-1">Pemasukan</div>
                <div id="totalMasuk" class="text-sm md:text-lg font-bold text-slate-800 truncate">Rp 0</div>
            </div>
            <div class="bg-white p-4 rounded-xl card-shadow border-l-4 border-red-500">
                <div class="text-[10px] font-bold text-slate-400 uppercase leading-tight mb-1">Pengeluaran</div>
                <div id="totalKeluar" class="text-sm md:text-lg font-bold text-slate-800 truncate">Rp 0</div>
            </div>
            <div class="bg-white p-4 rounded-xl card-shadow border-l-4 border-blue-500 col-span-2 md:col-span-1">
                <div class="text-[10px] font-bold text-slate-400 uppercase leading-tight mb-1">Total Sisa Piutang</div>
                <div id="totalPiutang" class="text-sm md:text-lg font-bold text-slate-800 truncate">Rp 0</div>
            </div>
        </div>

        <!-- Filter & Search -->
        <div class="bg-white p-3 rounded-xl card-shadow mb-5 flex flex-col md:flex-row gap-3 items-center">
            <div class="relative w-full md:flex-1">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" oninput="applyFilter()" placeholder="Cari data..." 
                    class="w-full pl-9 pr-4 py-2 text-sm border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div id="rowCounter" class="text-[10px] font-bold text-slate-400 uppercase bg-slate-100 px-3 py-1 rounded-full">Memuat...</div>
        </div>

        <!-- Table Container -->
        <div class="bg-white rounded-xl card-shadow overflow-hidden border border-slate-100">
            <div class="table-container">
                <table class="w-full text-left border-collapse" id="mainTable">
                    <thead class="bg-slate-50 sticky top-0 z-10 border-b border-slate-200 text-[11px] uppercase text-slate-500 tracking-wider" id="tableHead"></thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100 text-[13px]"></tbody>
                </table>
            </div>

            <!-- Loading Overlay -->
            <div id="loadingOverlay" class="p-16 flex flex-col items-center justify-center">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-8 w-8 mb-3"></div>
                <p class="text-slate-500 text-xs">Menghubungkan ke Google Sheets...</p>
            </div>
        </div>
    </div>

    <!-- Modal Detail Transaksi -->
    <div id="detailModal" class="fixed inset-0 z-50 hidden flex items-end md:items-center justify-center p-0 md:p-4 bg-black bg-opacity-60 backdrop-blur-sm">
        <div id="modalContent" class="bg-white rounded-t-2xl md:rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden transition-all transform translate-y-full md:translate-y-0 md:scale-95 opacity-0">
            <div class="px-5 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-slate-800 text-sm md:text-base">Detail Informasi</h3>
                <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center bg-slate-200 rounded-full text-slate-600 hover:text-slate-900 transition-colors">&times;</button>
            </div>
            <div id="modalBody" class="p-5 space-y-4 overflow-y-auto max-h-[70vh] md:max-h-[80vh]"></div>
            <div class="px-5 py-4 border-t border-slate-100 bg-white text-right">
                <button onclick="closeModal()" class="w-full md:w-auto bg-slate-100 hover:bg-slate-200 text-slate-700 px-6 py-2.5 rounded-xl font-bold text-sm transition-colors">Tutup</button>
            </div>
        </div>
    </div>

    <script>
        const URLS = {
            transaksi: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvAQXltAVp8lnrXXVVPJr1hYEi8cAJrqz182qT23eaiI8t-MoBrEtE7bAAJqKEyKKTig4hpA9DNuQB/pub?gid=2057149863&single=true&output=csv",
            piutang: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvAQXltAVp8lnrXXVVPJr1hYEi8cAJrqz182qT23eaiI8t-MoBrEtE7bAAJqKEyKKTig4hpA9DNuQB/pub?gid=1961183383&single=true&output=csv",
            stok: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvAQXltAVp8lnrXXVVPJr1hYEi8cAJrqz182qT23eaiI8t-MoBrEtE7bAAJqKEyKKTig4hpA9DNuQB/pub?gid=1595956432&single=true&output=csv"
        };

        let currentTab = 'transaksi';
        let db = { transaksi: [], piutang: [], stok: [] };

        function formatIDR(val) {
            const num = parseFloat(val) || 0;
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
        }

        function switchTab(tab) {
            currentTab = tab;
            ['transaksi', 'piutang', 'stok'].forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if(t === tab) el.classList.add('tab-active');
                else el.classList.remove('tab-active');
            });
            renderContent();
        }

        async function fetchAllData() {
            const btn = document.getElementById('refreshBtn');
            const loader = document.getElementById('loadingOverlay');
            btn.disabled = true;
            loader.classList.remove('hidden');

            try {
                const results = await Promise.all([
                    fetchCSV(URLS.transaksi),
                    fetchCSV(URLS.piutang),
                    fetchCSV(URLS.stok)
                ]);
                db.transaksi = results[0];
                db.piutang = results[1];
                db.stok = results[2];
                calculateStats();
                renderContent();
            } catch (e) {
                console.error(e);
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        }

        function fetchCSV(url) {
            return new Promise((resolve, reject) => {
                Papa.parse(url, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => resolve(results.data),
                    error: (err) => reject(err)
                });
            });
        }

        function calculateStats() {
            let masuk = 0, keluar = 0, piutangTotal = 0;
            db.transaksi.forEach(r => {
                masuk += parseFloat(r["Masuk"]) || 0;
                keluar += parseFloat(r["Keluar"]) || 0;
            });
            db.piutang.forEach(r => {
                piutangTotal += parseFloat(r["Sisa Piutang"]) || 0;
            });
            document.getElementById('totalMasuk').innerText = formatIDR(masuk);
            document.getElementById('totalKeluar').innerText = formatIDR(keluar);
            document.getElementById('totalPiutang').innerText = formatIDR(piutangTotal);
        }

        function renderContent() {
            const head = document.getElementById('tableHead');
            if (currentTab === 'transaksi') {
                head.innerHTML = `<tr><th class="px-4 py-3">Waktu & Deskripsi</th><th class="px-4 py-3 text-right">Nominal</th></tr>`;
            } else if (currentTab === 'piutang') {
                head.innerHTML = `<tr><th class="px-4 py-3">Pelanggan</th><th class="px-4 py-3 text-right">Sisa Piutang</th></tr>`;
            } else if (currentTab === 'stok') {
                head.innerHTML = `<tr><th class="px-4 py-3">Barang</th><th class="px-4 py-3 text-center">Stok</th></tr>`;
            }
            applyFilter();
        }

        function applyFilter() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const body = document.getElementById('tableBody');
            let data = db[currentTab];

            // PENYARINGAN KHUSUS PIUTANG: Sembunyikan yang Sisa Piutang = 0 atau Status = Lunas
            if (currentTab === 'piutang') {
                data = data.filter(row => {
                    const sisa = parseFloat(row["Sisa Piutang"]) || 0;
                    const status = (row["Status"] || "").toLowerCase();
                    return sisa > 0 && status !== 'lunas';
                });
            }

            const filtered = data.filter(row => Object.values(row).some(v => String(v).toLowerCase().includes(query)));
            body.innerHTML = '';
            document.getElementById('rowCounter').innerText = `${filtered.length} Data`;

            filtered.forEach((row) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors border-b border-slate-50 cursor-pointer active:bg-slate-100";
                tr.onclick = () => showDetail(row);
                
                let html = '';
                if (currentTab === 'transaksi') {
                    const m = parseFloat(row["Masuk"]) || 0;
                    const k = parseFloat(row["Keluar"]) || 0;
                    const nominal = m > 0 ? m : k;
                    const color = m > 0 ? 'text-green-600' : 'text-red-600';
                    html = `
                        <td class="px-4 py-3">
                            <div class="text-[10px] text-slate-400 font-medium">${row["Waktu"]}</div>
                            <div class="font-bold text-slate-800 line-clamp-1">${row["Keterangan"]}</div>
                            <div class="text-[10px]"><span class="px-1.5 py-0.5 bg-slate-100 rounded font-semibold text-slate-500">${row["Kategori"]}</span></div>
                        </td>
                        <td class="px-4 py-3 text-right font-bold ${color}">${formatIDR(nominal)}</td>
                    `;
                } else if (currentTab === 'piutang') {
                    html = `
                        <td class="px-4 py-3">
                            <div class="font-bold text-slate-800">${row["Nama Pelanggan"]}</div>
                            <div class="text-[10px] text-slate-400">${row["Waktu"]}</div>
                        </td>
                        <td class="px-4 py-3 text-right text-red-600 font-bold">
                            ${formatIDR(row["Sisa Piutang"])}
                            <div class="text-[10px] font-medium text-slate-400">DARI ${formatIDR(row["Total Tagihan"])}</div>
                        </td>
                    `;
                } else if (currentTab === 'stok') {
                    const sisa = parseFloat(row["Sisa Stok"]) || 0;
                    html = `
                        <td class="px-4 py-3 font-bold text-slate-800">${row["Nama Barang"]}</td>
                        <td class="px-4 py-3 text-center">
                            <span class="px-3 py-1 bg-blue-50 text-blue-700 rounded-lg font-black text-sm">${sisa}</span>
                        </td>
                    `;
                }
                tr.innerHTML = html;
                body.appendChild(tr);
            });
        }

        function showDetail(data) {
            const modal = document.getElementById('detailModal');
            const content = document.getElementById('modalContent');
            const body = document.getElementById('modalBody');
            
            let html = '';
            
            if (currentTab === 'transaksi') {
                let itemsHtml = '<p class="text-slate-400 italic text-xs">Tidak ada rincian item</p>';
                if (data["Detail JSON"]) {
                    try {
                        const items = JSON.parse(data["Detail JSON"]);
                        if (Array.isArray(items)) {
                            itemsHtml = `<div class="bg-slate-50 rounded-xl overflow-hidden border border-slate-100">
                                <table class="w-full text-[11px]">
                                    <thead class="bg-slate-200 text-slate-600">
                                        <tr><th class="p-2 text-left">Item</th><th class="p-2 text-center">Qty</th><th class="p-2 text-right">Harga</th></tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-100">
                                        ${items.map(i => `
                                            <tr>
                                                <td class="p-2 font-medium">${i.nama || '-'}</td>
                                                <td class="p-2 text-center font-bold">${i.qty || 1}</td>
                                                <td class="p-2 text-right font-semibold">${formatIDR(i.harga)}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>`;
                        }
                    } catch(e) {}
                }

                html = `
                    <div class="space-y-4">
                        <div class="flex flex-col items-center justify-center pb-2 border-b border-slate-100 border-dashed">
                            <div class="text-[10px] text-slate-400 font-bold uppercase mb-1">Total Nominal</div>
                            <div class="text-2xl font-black ${data["Tipe"]==='MASUK'?'text-green-600':'text-red-600'}">${formatIDR(parseFloat(data["Masuk"]) || parseFloat(data["Keluar"]))}</div>
                        </div>
                        <div class="grid grid-cols-2 gap-y-4 gap-x-2">
                            <div><label class="text-[10px] font-bold text-slate-400 uppercase block">Tanggal</label><p class="text-xs font-semibold">${data["Waktu"]}</p></div>
                            <div><label class="text-[10px] font-bold text-slate-400 uppercase block">ID Ref</label><p class="text-[10px] font-mono truncate">${data["ID"]}</p></div>
                            <div><label class="text-[10px] font-bold text-slate-400 uppercase block">Kategori</label><p class="text-xs font-semibold">${data["Kategori"]}</p></div>
                            <div><label class="text-[10px] font-bold text-slate-400 uppercase block">Metode</label><p class="text-xs font-semibold">${data["Metode"] || '-'}</p></div>
                        </div>
                        <div><label class="text-[10px] font-bold text-slate-400 uppercase block">Keterangan</label><p class="text-xs text-slate-600 leading-relaxed">${data["Keterangan"]}</p></div>
                        <div class="pt-2">
                            <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Daftar Belanja</label>
                            ${itemsHtml}
                        </div>
                    </div>
                `;
            } else if (currentTab === 'piutang') {
                html = `
                    <div class="space-y-4">
                        <div class="text-center">
                            <div class="text-[10px] text-slate-400 font-bold uppercase mb-1">Sisa Piutang</div>
                            <div class="text-2xl font-black text-red-600">${formatIDR(data["Sisa Piutang"])}</div>
                            <div class="inline-block mt-2 px-3 py-1 rounded-full text-[10px] font-bold uppercase ${(data["Status"]||"").toLowerCase()==='lunas'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${data["Status"]}</div>
                        </div>
                        <div class="space-y-2 pt-4 border-t border-slate-100">
                            <div class="flex justify-between items-center text-xs"><span class="text-slate-500 font-medium">Pelanggan</span><span class="font-bold">${data["Nama Pelanggan"]}</span></div>
                            <div class="flex justify-between items-center text-xs"><span class="text-slate-500 font-medium">Tanggal Transaksi</span><span>${data["Waktu"]}</span></div>
                            <div class="flex justify-between items-center text-xs"><span class="text-slate-500 font-medium">Total Tagihan</span><span class="font-semibold">${formatIDR(data["Total Tagihan"])}</span></div>
                            <div class="flex justify-between items-center text-xs"><span class="text-slate-500 font-medium text-green-600">Terbayar (DP)</span><span class="font-semibold text-green-600">${formatIDR(data["DP"])}</span></div>
                        </div>
                    </div>
                `;
            } else if (currentTab === 'stok') {
                html = `
                    <div class="space-y-6 text-center">
                        <div>
                             <i class="fas fa-box-open text-blue-100 text-6xl mb-2"></i>
                             <h4 class="text-lg font-bold text-slate-800">${data["Nama Barang"]}</h4>
                        </div>
                        <div class="grid grid-cols-3 gap-2 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <div><div class="text-[9px] text-slate-400 font-bold uppercase">Masuk</div><div class="text-base text-green-600 font-bold">${data["Masuk"]}</div></div>
                            <div><div class="text-[9px] text-slate-400 font-bold uppercase">Keluar</div><div class="text-base text-red-600 font-bold">${data["Keluar"]}</div></div>
                            <div><div class="text-[9px] text-slate-400 font-bold uppercase">Tersedia</div><div class="text-xl text-blue-600 font-black">${data["Sisa Stok"]}</div></div>
                        </div>
                        <div class="text-[10px] text-slate-400 bg-white p-2 border border-slate-100 rounded-lg inline-block">Update: ${data["Update Terakhir"]}</div>
                    </div>
                `;
            }

            body.innerHTML = html;
            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('translate-y-full', 'scale-95', 'opacity-0');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('detailModal');
            const content = document.getElementById('modalContent');
            const isMobile = window.innerWidth < 768;
            if(isMobile) content.classList.add('translate-y-full');
            else content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 250);
        }

        window.onclick = function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target == modal) closeModal();
        }

        window.onload = fetchAllData;
    </script>
</body>
</html>
